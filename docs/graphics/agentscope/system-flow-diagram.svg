<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0F14"/>
      <stop offset="1" stop-color="#101826"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="0" x2="1420" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 700 42px ui-sans-serif, Inter, system-ui, -apple-system, sans-serif; fill: #E6EDF7; }
      .label { font: 600 25px ui-sans-serif, Inter, system-ui, -apple-system, sans-serif; fill: #D9E2F0; }
      .sub { font: 500 18px ui-sans-serif, Inter, system-ui, -apple-system, sans-serif; fill: #8FA3BF; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#5B86F7"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  <circle cx="340" cy="140" r="200" fill="#7C3AED" opacity="0.15" filter="url(#glow)"/>
  <circle cx="1290" cy="760" r="240" fill="#2563EB" opacity="0.14" filter="url(#glow)"/>

  <text x="120" y="130" class="title">AgentScope System Flow</text>

  <g stroke="url(#accent)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.9">
    <line x1="280" y1="450" x2="420" y2="450" marker-end="url(#arrow)"/>
    <line x1="520" y1="450" x2="660" y2="450" marker-end="url(#arrow)"/>
    <line x1="760" y1="450" x2="900" y2="450" marker-end="url(#arrow)"/>
    <line x1="1000" y1="450" x2="1140" y2="450" marker-end="url(#arrow)"/>
    <line x1="1240" y1="450" x2="1380" y2="450" marker-end="url(#arrow)"/>
  </g>

  <g>
    <rect x="120" y="360" width="160" height="180" rx="22" fill="#121A26" stroke="#2B3D57"/>
    <text x="200" y="430" text-anchor="middle" class="label">User</text>
    <text x="200" y="462" text-anchor="middle" class="label">Application</text>
  </g>

  <g>
    <rect x="360" y="360" width="160" height="180" rx="22" fill="#121A26" stroke="#324B72"/>
    <text x="440" y="445" text-anchor="middle" class="label">SDK</text>
    <text x="440" y="482" text-anchor="middle" class="sub">trace + metrics</text>
  </g>

  <g>
    <rect x="600" y="360" width="160" height="180" rx="22" fill="#121A26" stroke="#355A88"/>
    <text x="680" y="430" text-anchor="middle" class="label">AgentScope</text>
    <text x="680" y="464" text-anchor="middle" class="label">API</text>
  </g>

  <g>
    <rect x="840" y="360" width="160" height="180" rx="22" fill="#121A26" stroke="#3565A0"/>
    <text x="920" y="430" text-anchor="middle" class="label">Run</text>
    <text x="920" y="464" text-anchor="middle" class="label">Processing</text>
  </g>

  <g>
    <rect x="1080" y="360" width="160" height="180" rx="22" fill="#121A26" stroke="#3370B8"/>
    <text x="1160" y="445" text-anchor="middle" class="label">Spans</text>
    <text x="1160" y="482" text-anchor="middle" class="sub">normalized graph</text>
  </g>

  <g>
    <rect x="1320" y="360" width="160" height="180" rx="22" fill="#121A26" stroke="#2D7BD0"/>
    <text x="1400" y="430" text-anchor="middle" class="label">Insights</text>
    <text x="1400" y="464" text-anchor="middle" class="label">Dashboard</text>
  </g>
</svg>
